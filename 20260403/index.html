<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>네이버 지도 기본 테스트</title>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=s95475emm3"></script>
    <style>
        /* 지도가 보일 영역의 크기를 지정합니다 */
        #map {
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>

    <h2>내 첫 네이버 지도 띄우기 🚀</h2>
    <div id="map"></div>

    <script>
        // 2. 지도를 생성하는 가장 기본적인 코드입니다.
        var mapOptions = {
            center: new naver.maps.LatLng(35.8714, 128.6014), // 대구 시청 기준 좌표
            zoom: 12
        };

        var map = new naver.maps.Map('map', mapOptions);
    </script>

</body>
</html>
