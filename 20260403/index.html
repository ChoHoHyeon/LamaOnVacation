<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자동차 경로·유류비 계산기</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f5f7fb;
      color: #222;
    }
    .app { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; }
    .panel { background: #fff; border-right: 1px solid #e5e7eb; padding: 20px; overflow-y: auto; }
    .map-wrap { position: relative; background: #eef2f7; }
    #map { width: 100%; height: 100vh; }
    h1 { margin: 0 0 16px; font-size: 24px; text-align: center; font-weight: 700; letter-spacing: -0.3px; color: #111827;}
    h2 { margin: 2px 0 10px; font-size: 18px; border-left: 4px solid #22c55e; padding-left: 8px; }
    .desc { font-size: 13px; line-height: 1.55; color: #555; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .row { display: flex; gap: 8px; }
    input[type="text"], input[type="number"], input[type="date"], select {
      width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; background: #fff;
    }
    input[readonly] { background: #f9fafb; }
    button { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-search { background: #22c55e; color: white; }
    .btn-route { background: #2563eb; color: white; width: 100%; }
    .btn-calc { background: #111827; color: white; width: 100%; }
    .btn-sub { background: #6b7280; color: white; width: 100%; }

    .result-box {
      background: #f1f3f6;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      margin-top: 10px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
    }

    .result-item { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px dashed #e5e7eb; font-size: 14px; }
    .result-item:last-child { border-bottom: none; }
    .muted { color: #6b7280; font-size: 12px; }
    .hr { height: 1px; background: #e5e7eb; margin: 18px 0; }
    .checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; margin: 8px 0 14px; }
    .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; }
    .badge { display: inline-block; font-size: 12px; background: #eef2ff; color: #3730a3; padding: 4px 8px; border-radius: 999px; margin-bottom: 12px; }
    .warning { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; padding: 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; margin-top: 12px; }
    .btn-group { display: flex; gap: 8px; margin-top: 10px; }

    .metrics-animated {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .35s ease, transform .35s ease;
    }

    .metrics-animated.show {
      opacity: 1;
      transform: translateY(0);
    }

    .route-status {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%) translateY(-8px);
      background: rgba(17, 24, 39, 0.88); color: #fff; padding: 10px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,.18);
      opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; z-index: 30; white-space: nowrap;
    }
    .route-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .map-hint {
      position: absolute; bottom: 18px; left: 18px; background: rgba(255,255,255,.92);
      color: #374151; font-size: 12px; padding: 9px 12px; border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08); z-index: 20; backdrop-filter: blur(6px); max-width: 360px;
    }

    @media (max-width: 960px) {
      .app { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid #e5e7eb; }
      #map { height: 60vh; }
      .route-status { max-width: calc(100% - 24px); overflow: hidden; text-overflow: ellipsis; }
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    
    .compact-field {
      margin-bottom: 8px;
    }

    .compact-check {
      margin-top: 6px;
    }

    .compact-check label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      margin: 0;
    }

    @media (max-width: 960px) {
      .form-grid-2 {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }

    .section-card {
      background: linear-gradient(180deg, #ffffff 0%, #f9fafb 100%);
      border-radius: 16px;
      padding: 14px 16px 16px;
      margin-bottom: 18px;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 2px 6px rgba(0, 0, 0, 0.04),
        0 8px 20px rgba(0, 0, 0, 0.06);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      text-align: center;
      align-items: start;
    }

    .result-col {
      padding: 6px 4px;
    }

    .result-col .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .result-col .value {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
    }

    .result-single {
      text-align: center;
      margin-bottom: 8px;
    }

    .result-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      text-align: center;
      margin-top: 6px;
      gap: 8px;
    }

    .result-single .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 2px;
    }

    .result-single .value {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }

    .button-group {
      margin-bottom: 10px;
    }

   
.rule-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin: 10px 0 14px;
  flex-wrap: wrap;
}

.rule-check-group {
  display: flex;

.rule-check-group label {

.digit-inline select {

}

}

.date-row .field {
  margin-bottom: 0;
}

.date-row input[type="date"] {
  width: 100%;
  min-width: 0;
}

<body>
  <div class="app">
    <aside class="panel">
      <h1>자동차 경로·유류비 계산기</h1>

      <div class="section-card">
        <h2>1. 주소 검색 및 경로 표시</h2>

        <div class="field">
          <label for="startAddress">거주지 주소</label>
          <div class="row" style="position:relative;">
            <div style="flex:1; position:relative;">
              <input id="startAddress" type="text" placeholder="예: 대구광역시 달서구 ..." autocomplete="off" oninput="handleAddressInput('start')" onfocus="handleAddressInput('start')" />
              <div id="startSuggestions" style="display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #d1d5db; border-radius:10px; margin-top:4px; box-shadow:0 8px 20px rgba(0,0,0,.08); z-index:1000; max-height:220px; overflow-y:auto;"></div>
            </div>
            <button class="btn-search" type="button" onclick="searchStart()">검색</button>
          </div>
        </div>

        <div class="field">
          <label for="goalAddress">목적지 주소</label>
          <div class="row" style="position:relative;">
            <div style="flex:1; position:relative;">
              <input id="goalAddress" type="text" placeholder="예: 달성군청" autocomplete="off" oninput="handleAddressInput('goal')" onfocus="handleAddressInput('goal')" />
              <div id="goalSuggestions" style="display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #d1d5db; border-radius:10px; margin-top:4px; box-shadow:0 8px 20px rgba(0,0,0,.08); z-index:1000; max-height:220px; overflow-y:auto;"></div>
            </div>
            <button class="btn-search" type="button" onclick="searchGoal()">검색</button>
          </div>
        </div>

        <div class="field" style="display:none;">
          <label>선택된 좌표</label>
          <input id="coordInfo" type="text" readonly value="출발지와 목적지를 검색하면 표시됩니다." />
        </div>

        <div class="field">
          <button class="btn-route" type="button" onclick="drawDrivingRoute()">자동차 경로 표시</button>
        </div>

        <div class="btn-group">
          <button id="editRouteBtn" class="btn-sub" type="button" onclick="toggleEditRoute()">선편집</button>
          <button class="btn-sub" type="button" onclick="resetEditRoute()">편집 초기화</button>
        </div>

        <div id="routeSummaryBox" class="result-box metrics-animated">
          <div class="result-item"><span>거리</span><strong id="distanceText">-</strong></div>
        </div>
      </div>

      <div class="section-card">
        <h2>2. 유류비 계산</h2>

        <div class="form-grid-2">
          <div class="field compact-field">
            <label for="efficiency">연비</label>
            <input id="efficiency" type="number" min="0.1" step="0.1" value="12.0" placeholder="km/L 또는 km/kWh" />
          </div>

          <div class="field compact-field">
            <label for="fuelType">유종</label>
            <select id="fuelType">
              <option value="휘발유" selected>휘발유</option>
              <option value="경유">경유</option>
              <option value="LPG">LPG</option>
              <option value="전기">전기(참고용)</option>
            </select>
          </div>

          <div class="field compact-field">
            <label for="fuelPrice">현재 연료 가격</label>
            <input id="fuelPrice" type="number" min="0" step="1" value="1700" placeholder="원/L 또는 원/kWh" />
          </div>
        </div>

        <div class="compact-check">
          <label>
            <input type="checkbox" id="roundTrip" />
            왕복 계산
          </label>
        </div>

        <div class="field">
          <button class="btn-calc" type="button" onclick="calculateFuelCost()">유류비 계산하기</button>
        </div>

        <div id="fuelSummaryBox" class="result-box metrics-animated">
          <div class="result-grid">
            <div class="result-col">
              <div class="label" id="tripDistanceLabel">편도 거리</div>
              <div class="value" id="tripDistanceText">-</div>
            </div>
            <div class="result-col">
              <div class="label">연료</div>
              <div class="value" id="usedFuelText">-</div>
            </div>
            <div class="result-col">
              <div class="label">유류비</div>
              <div class="value" id="fuelCostText">-</div>
            </div>
          </div>
        </div>
      </div>





<div class="section-card">
  <h2>3. 2부제 / 5부제 절감비용 계산</h2>

  <div class="desc">
    <b>평일 기준</b> <b>1일 유류비(왕복) </b> 기준으로 산정합니다.
  </div>

  <!-- 🔥 상단 조건 영역 -->
  <div class="rule-top-row">
  <div class="rule-check-group">
    <label><input type="checkbox" id="rule2" /> 2부제</label>
    <label><input type="checkbox" id="rule5" /> 5부제</label>
  </div>

  <div class="digit-inline">
    <span class="digit-label">자동차 끝번호</span>
    <select id="carLastDigit">
      <option value="">선택</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
    </select>
  </div>
</div>

<div class="date-row">
  <div class="field compact-field">
    <label for="startDate">시작 날짜</label>
    <input id="startDate" type="date" />
  </div>

  <div class="field compact-field">
    <label for="endDate">종료 날짜</label>
    <input id="endDate" type="date" />
  </div>
</div>

  <div class="field">
    <button class="btn-calc" type="button" onclick="calculateSaving()">절감비용 계산하기</button>
  </div>

  <div class="result-box">
    <div class="result-single">
      <div class="label">평일수</div>
      <div class="value" id="weekdayCountText">-</div>
    </div>

    <div class="result-grid-2">
      <div class="result-col">
        <div class="label">2부제 적용일수</div>
        <div class="value" id="rule2DaysText">-</div>
      </div>
      <div class="result-col">
        <div class="label">5부제 적용일수</div>
        <div class="value" id="rule5DaysText">-</div>
      </div>
    </div>

    <div class="result-grid-2">
      <div class="result-col">
        <div class="label">2부제 절감액</div>
        <div class="value" id="saving2Text">-</div>
      </div>
      <div class="result-col">
        <div class="label">5부제 절감액</div>
        <div class="value" id="saving5Text">-</div>
      </div>
    </div>
  </div>
</div>
 </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <div id="routeStatus" class="route-status">경로를 계산 중입니다...</div>
      <div class="map-hint">선편집 시: 노란점은 큰 흐름 조정, 진한 파란점은 기존 세부점 재수정, 연한 파란점은 새 세부점 추가용입니다.</div>
    </section>
  </div>

  <script>
    let map;
    let startMarker = null;
    let goalMarker = null;
    let routePolyline = null;
    let routeShadowPolyline = null;
    let startCoord = null;
    let goalCoord = null;
    let currentRouteDistanceKm = 0;
    let currentFuelCost = 0;
    let isEditMode = false;
    let suggestTimer = null;
    let routeAnimTimer = null;

    let pointIdCounter = 1;
    let intermediatePoints = [];
    let mainMarkers = [];
    let detailPointMarkers = [];
    let detailHandleMarkers = [];

    let vehicleMarker = null;
    
    const ROUTE_DETOUR_FACTOR = 1.05;
    const DEFAULT_MAIN_RATIOS = [0.25, 0.5, 0.75];

    const customPlaceAliases = [
      { keyword: '달성군청', address: '대구광역시 달성군 논공읍 달성군청로 33', label: '달성군청' },
      { keyword: '달성군청역', address: '대구광역시 달성군 논공읍 달성군청로 33 인근', label: '달성군청역 인근' },
      { keyword: '상인화성파크드림', address: '대구광역시 달서구 송현로7길 9 상인화성파크드림', label: '상인화성파크드림' },
      { keyword: '대구수목원', address: '대구광역시 달서구 화암로 342', label: '대구수목원' },
      { keyword: '대구교도소', address: '대구광역시 달성군 하빈면 하빈로 455', label: '대구교도소' },
      { keyword: '현풍테크노폴리스', address: '대구광역시 달성군 유가읍 테크노대로 일원', label: '현풍테크노폴리스' }
    ];

    function initMap() {
      map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(35.8714, 128.6014),
        zoom: 11
      });
    }

    function nextPointId() {
      return `point-${pointIdCounter++}`;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function normalizePoint(point) {
      if (point instanceof naver.maps.LatLng) return point;
      const lat = typeof point.lat === 'function' ? point.lat() : (point.y ?? point.lat);
      const lng = typeof point.lng === 'function' ? point.lng() : (point.x ?? point.lng);
      return new naver.maps.LatLng(lat, lng);
    }

    function normalizePath(points) {
      return points.map(normalizePoint);
    }

    function interpolateLatLng(startPoint, endPoint, ratio) {
      const start = normalizePoint(startPoint);
      const end = normalizePoint(endPoint);
      return new naver.maps.LatLng(
        start.lat() + (end.lat() - start.lat()) * ratio,
        start.lng() + (end.lng() - start.lng()) * ratio
      );
    }

    function getStartLatLng() {
      return new naver.maps.LatLng(startCoord.lat, startCoord.lng);
    }

    function getGoalLatLng() {
      return new naver.maps.LatLng(goalCoord.lat, goalCoord.lng);
    }

    function getControlPoints() {
      if (!startCoord || !goalCoord) return [];
      return [getStartLatLng(), ...intermediatePoints.map(item => normalizePoint(item.coord)), getGoalLatLng()];
    }

    function getBoundsFromPath(points) {
      const bounds = new naver.maps.LatLngBounds();
      normalizePath(points).forEach(point => bounds.extend(point));
      return bounds;
    }

    function getDistanceMeters(p1, p2) {
      const point1 = normalizePoint(p1);
      const point2 = normalizePoint(p2);
      const lat1 = point1.lat();
      const lng1 = point1.lng();
      const lat2 = point2.lat();
      const lng2 = point2.lng();

      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getSmoothPath(points, samplesPerSegment = 16) {
      const pts = normalizePath(points);
      if (pts.length < 2) return pts;

      const result = [];
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(pts.length - 1, i + 2)];

        for (let j = 0; j < samplesPerSegment; j++) {
          const t = j / samplesPerSegment;
          const t2 = t * t;
          const t3 = t2 * t;

          const lat = 0.5 * (
            (2 * p1.lat()) +
            (-p0.lat() + p2.lat()) * t +
            (2 * p0.lat() - 5 * p1.lat() + 4 * p2.lat() - p3.lat()) * t2 +
            (-p0.lat() + 3 * p1.lat() - 3 * p2.lat() + p3.lat()) * t3
          );

          const lng = 0.5 * (
            (2 * p1.lng()) +
            (-p0.lng() + p2.lng()) * t +
            (2 * p0.lng() - 5 * p1.lng() + 4 * p2.lng() - p3.lng()) * t2 +
            (-p0.lng() + 3 * p1.lng() - 3 * p2.lng() + p3.lng()) * t3
          );

          result.push(new naver.maps.LatLng(lat, lng));
        }
      }

      result.push(pts[pts.length - 1]);
      return result;
    }

  
    function getCurvePointOnSegment(points, index, t = 0.5) {
      const pts = normalizePath(points);
      if (pts.length < 2 || index < 0 || index >= pts.length - 1) {
        return null;
      }

      const p0 = pts[Math.max(0, index - 1)];
      const p1 = pts[index];
      const p2 = pts[index + 1];
      const p3 = pts[Math.min(pts.length - 1, index + 2)];

      const t2 = t * t;
      const t3 = t2 * t;

      const lat = 0.5 * (
        (2 * p1.lat()) +
        (-p0.lat() + p2.lat()) * t +
        (2 * p0.lat() - 5 * p1.lat() + 4 * p2.lat() - p3.lat()) * t2 +
        (-p0.lat() + 3 * p1.lat() - 3 * p2.lat() + p3.lat()) * t3
      );

      const lng = 0.5 * (
        (2 * p1.lng()) +
        (-p0.lng() + p2.lng()) * t +
        (2 * p0.lng() - 5 * p1.lng() + 4 * p2.lng() - p3.lng()) * t2 +
        (-p0.lng() + 3 * p1.lng() - 3 * p2.lng() + p3.lng()) * t3
      );

      return new naver.maps.LatLng(lat, lng);
    }

function getBearingDeg(p1, p2) {
  const a = normalizePoint(p1);
  const b = normalizePoint(p2);

  const dx = b.lng() - a.lng();
  const dy = b.lat() - a.lat();

  return Math.atan2(dy, dx) * 180 / Math.PI + 90;
}

    function searchAddress(address, type) {
  const rawQuery = (address || '').trim();
  if (!rawQuery) {
    alert(type === 'start' ? '거주지 주소를 입력하세요.' : '목적지 주소를 입력하세요.');
    return;
  }

  const normalizedQuery = normalizeSearchKeyword(rawQuery);

  const aliasMatch = customPlaceAliases.find(item =>
    item.keyword.includes(normalizedQuery) ||
    item.address.includes(normalizedQuery) ||
    normalizedQuery.includes(item.keyword)
  );

  const tryQueries = [];
  if (aliasMatch) tryQueries.push(aliasMatch.address);
  tryQueries.push(rawQuery);
  if (normalizedQuery !== rawQuery) tryQueries.push(normalizedQuery);

  // 중복 제거
  const uniqueQueries = [...new Set(tryQueries.filter(Boolean))];

  function applyGeocodeResult(item, originalQuery) {
    const lat = parseFloat(item.y);
    const lng = parseFloat(item.x);
    const latlng = new naver.maps.LatLng(lat, lng);
    const addressText = item.roadAddress || item.jibunAddress || originalQuery;

    if (type === 'start') {
      startCoord = { lat, lng, address: addressText };
      if (startMarker) startMarker.setMap(null);
      startMarker = new naver.maps.Marker({
        position: latlng,
        map,
        title: '출발지',
        icon: createMarkerIcon('#ef4444')
      });
    } else {
      goalCoord = { lat, lng, address: addressText };
      if (goalMarker) goalMarker.setMap(null);
      goalMarker = new naver.maps.Marker({
        position: latlng,
        map,
        title: '목적지',
        icon: createMarkerIcon('#ef4444')
      });
    }

    updateCoordInfo();
    map.setCenter(latlng);
  }

  function tryNext(index) {
    if (index >= uniqueQueries.length) {
      alert('검색 결과가 없습니다. 도로명주소, 지번주소, 건물명 중 다른 형태로 다시 입력해보세요.');
      return;
    }

    const query = uniqueQueries[index];

    naver.maps.Service.geocode({ query }, function(status, response) {
      if (
        status === naver.maps.Service.Status.OK &&
        response.v2 &&
        response.v2.addresses &&
        response.v2.addresses.length > 0
      ) {
        applyGeocodeResult(response.v2.addresses[0], query);
      } else {
        tryNext(index + 1);
      }
    });
  }

  tryNext(0);
}

            <div style="font-size:14px; color:#111827;">${title}</div>

      suggestTimer = setTimeout(() => {
        const localMatches = customPlaceAliases
          .filter(item => item.keyword.includes(query) || item.address.includes(query) || query.includes(item.keyword))
          .slice(0, 5)
          .map(item => ({ label: item.label, address: item.address, sub: `추천 장소 · ${item.address}` }));

        naver.maps.Service.geocode({ query }, function(status, response) {
          let apiResults = [];
          if (status === naver.maps.Service.Status.OK && response.v2 && response.v2.addresses) {
            apiResults = response.v2.addresses.slice(0, 5).map(item => ({
              label: item.roadAddress || item.jibunAddress || query,
              address: item.roadAddress || item.jibunAddress || query,
              sub: item.roadAddress && item.jibunAddress ? `지번: ${item.jibunAddress}` : ''
            }));
          }

          const merged = [];
          const seen = new Set();
          [...localMatches, ...apiResults].forEach(item => {
            if (!seen.has(item.address)) {
              seen.add(item.address);
              merged.push(item);
            }
          });

          renderSuggestions(type, merged.slice(0, 8));
        });
      }, 250);

    function renderStaticRoute() {

      clearRoutePolylines();
      routeShadowPolyline = new naver.maps.Polyline({

    function animateRoute() {
      const controlPoints = getControlPoints();
      if (controlPoints.length < 2) return;
      const smoothPath = getSmoothPath(controlPoints);

      clearRoutePolylines();
      resetMetricAnimation();

      const bounds = getBoundsFromPath(controlPoints);
      map.fitBounds(bounds);
      showRouteStatus('경로를 계산 중입니다...');

      setTimeout(() => {
        routeShadowPolyline = new naver.maps.Polyline({
          map,
          path: smoothPath,
          strokeColor: 'rgba(15, 23, 42, 0.16)',
          strokeWeight: 12,
          strokeOpacity: 1
        });




        
        routePolyline = new naver.maps.Polyline({
          map,
          path: [smoothPath[0]],
          strokeColor: '#ef4444',
          strokeWeight: 8,
          strokeOpacity: 0.96
        });

        vehicleMarker = new naver.maps.Marker({
          position: smoothPath[0],
          map,
          title: '자동차',
          icon: createVehicleIcon(0)
        });

        showRouteStatus('자동차 경로를 표시하는 중입니다...');
        let stepIndex = 1;

        routeAnimTimer = setInterval(() => {
          routePolyline.setPath(smoothPath.slice(0, stepIndex + 1));

          const currentPoint = smoothPath[stepIndex];
          const prevPoint = smoothPath[Math.max(0, stepIndex - 1)];
          const angle = getBearingDeg(prevPoint, currentPoint);

          if (vehicleMarker && currentPoint) {
            vehicleMarker.setPosition(currentPoint);
            vehicleMarker.setIcon(createVehicleIcon(angle));
          }

          stepIndex += 1;

          if (stepIndex >= smoothPath.length) {
            stopRouteAnimation();
            updateRouteSummary();
            revealMetricAnimation();
            showRouteStatus('경로 표시가 완료되었습니다.');
            setTimeout(() => hideRouteStatus(), 900);
          }
        }, 35);
      }, 320);
    }

    function updateRouteSummary() {
      const smoothPath = getSmoothPath(getControlPoints());
      if (smoothPath.length < 2) return;

      let totalDistanceM = 0;
      for (let i = 0; i < smoothPath.length - 1; i++) {
        totalDistanceM += getDistanceMeters(smoothPath[i], smoothPath[i + 1]);
      }
      totalDistanceM *= ROUTE_DETOUR_FACTOR;
      currentRouteDistanceKm = totalDistanceM / 1000;

      const avgSpeedKmH = 40;
      const durationMin = Math.max(1, Math.round((currentRouteDistanceKm / avgSpeedKmH) * 60));
      const tollFare = 0;

      document.getElementById('distanceText').textContent = `${currentRouteDistanceKm.toFixed(2)} km`;
      document.getElementById('tripDistanceText').textContent = `${currentRouteDistanceKm.toFixed(2)} km`;

      const efficiency = parseFloat(document.getElementById('efficiency').value);
      const fuelPrice = parseFloat(document.getElementById('fuelPrice').value);
      if (efficiency > 0 && !Number.isNaN(fuelPrice) && fuelPrice >= 0) {
        const fuelType = document.getElementById('fuelType').value;
        const usedFuel = currentRouteDistanceKm / efficiency;
        currentFuelCost = usedFuel * fuelPrice;
        document.getElementById('usedFuelText').textContent = fuelType === '전기' ? `${usedFuel.toFixed(2)} kWh` : `${usedFuel.toFixed(2)} L`;
        document.getElementById('fuelCostText').textContent = `${formatNumber(Math.round(currentFuelCost))} 원`;
      }
    }

    function createDetailHandles() {
      detailHandleMarkers.forEach(marker => marker.setMap(null));
      detailHandleMarkers = [];
      if (!isEditMode) return;

      const fullPoints = getControlPoints();
      if (fullPoints.length < 2) return;

      for (let segmentIndex = 0; segmentIndex < fullPoints.length - 1; segmentIndex++) {
        const leftPoint = segmentIndex === 0 ? null : intermediatePoints[segmentIndex - 1];
        const rightPoint = segmentIndex >= intermediatePoints.length ? null : intermediatePoints[segmentIndex];

        let nextLevel = 1;

        if (leftPoint && rightPoint) {
          nextLevel = Math.max(leftPoint.level || 1, rightPoint.level || 1) + 1;
        } else if (leftPoint) {
          nextLevel = (leftPoint.level || 1) + 1;
        } else if (rightPoint) {
          nextLevel = (rightPoint.level || 1) + 1;
        } else {
          nextLevel = 1;
        }

        if (nextLevel > 3) continue;

        const mid = getCurvePointOnSegment(fullPoints, segmentIndex, 0.5);
        const insertIndex = segmentIndex;

        const marker = new naver.maps.Marker({
          position: mid,
          map,
          draggable: true,
          title: `새 세부 포인트 추가 (단계 ${nextLevel})`,
          icon: createDetailHandleIcon(nextLevel)
        });

        let insertedPoint = null;

        naver.maps.Event.addListener(marker, 'dragstart', function(e) {
          insertedPoint = {
            id: nextPointId(),
            type: 'detail',
            level: nextLevel,
            coord: e.coord
          };
          intermediatePoints.splice(insertIndex, 0, insertedPoint);
          renderStaticRoute();
        });

        naver.maps.Event.addListener(marker, 'drag', function(e) {
          if (!insertedPoint) return;
          insertedPoint.coord = e.coord;
          renderStaticRoute();
        });

        naver.maps.Event.addListener(marker, 'dragend', function(e) {
          if (!insertedPoint) return;
          insertedPoint.coord = e.coord;
          renderStaticRoute();
          updateRouteSummary();
          refreshEditMarkers();
        });

        detailHandleMarkers.push(marker);
      }
    }

    function calculateFuelCost() {
      if (!currentRouteDistanceKm || currentRouteDistanceKm <= 0) {
        alert('먼저 자동차 경로를 표시하세요.');
        return;
      }

      const efficiency = parseFloat(document.getElementById('efficiency').value);
      const fuelPrice = parseFloat(document.getElementById('fuelPrice').value);
      const fuelType = document.getElementById('fuelType').value;

      if (!efficiency || efficiency <= 0) {
        alert('연비를 올바르게 입력하세요.');
        return;
      }
      if (fuelPrice < 0 || Number.isNaN(fuelPrice)) {
        alert('연료 가격을 올바르게 입력하세요.');
        return;
      }

      const isRoundTrip = document.getElementById('roundTrip').checked;
      const appliedDistanceKm = isRoundTrip ? currentRouteDistanceKm * 2 : currentRouteDistanceKm;

      const usedFuel = appliedDistanceKm / efficiency;
      currentFuelCost = usedFuel * fuelPrice;

      document.getElementById('tripDistanceLabel').textContent = isRoundTrip ? '왕복 이동 거리' : '편도 이동 거리';
      document.getElementById('tripDistanceText').textContent = `${appliedDistanceKm.toFixed(2)} km`;
      document.getElementById('usedFuelText').textContent = fuelType === '전기' ? `${usedFuel.toFixed(2)} kWh` : `${usedFuel.toFixed(2)} L`;
      document.getElementById('fuelCostText').textContent = `${formatNumber(Math.round(currentFuelCost))} 원`;
      revealMetricAnimation();
    }

    function countWeekdaysInclusive(startDate, endDate) {
      let count = 0;
      const current = new Date(startDate);
      const end = new Date(endDate);
      while (current <= end) {
        const day = current.getDay();
        if (day >= 1 && day <= 5) count++;
        current.setDate(current.getDate() + 1);
      }
      return count;
    }

    function isRule2Restricted(date, lastDigit) {
      const dayOfMonth = date.getDate();
      const dateParity = dayOfMonth % 2;
      const carParity = lastDigit % 2;
      return dateParity === carParity;
    }

    function isRule5Restricted(date, lastDigit) {
      const day = date.getDay();

      const ruleMap = {
        1: [1, 6],
        2: [2, 7],
        3: [3, 8],
        4: [4, 9],
        5: [5, 0]
      };

      if (!ruleMap[day]) return false;
      return ruleMap[day].includes(lastDigit);
    }

    function calculateSaving() {
      if (!currentFuelCost || currentFuelCost <= 0) {
        alert('먼저 유류비를 계산하세요.');
        return;
      }

      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const useRule2 = document.getElementById('rule2').checked;
      const useRule5 = document.getElementById('rule5').checked;
      const carLastDigitValue = document.getElementById('carLastDigit').value;

      if (!startDate || !endDate) {
        alert('시작 날짜와 종료 날짜를 선택하세요.');
        return;
      }

      if (startDate > endDate) {
        alert('종료 날짜는 시작 날짜보다 같거나 뒤여야 합니다.');
        return;
      }

      if (!useRule2 && !useRule5) {
        alert('2부제 또는 5부제 중 하나 이상 선택하세요.');
        return;
      }

      if (carLastDigitValue === '') {
        alert('자동차 끝번호를 선택하세요.');
        return;
      }

      const carLastDigit = parseInt(carLastDigitValue, 10);

      let weekdays = 0;
      let rule2Days = 0;
      let rule5Days = 0;

      const current = new Date(startDate);
      const end = new Date(endDate);

      while (current <= end) {
        const day = current.getDay();

        if (day >= 1 && day <= 5) {
          weekdays++;

          if (useRule2 && isRule2Restricted(current, carLastDigit)) {
            rule2Days++;
          }

          if (useRule5 && isRule5Restricted(current, carLastDigit)) {
            rule5Days++;
          }
        }

        current.setDate(current.getDate() + 1);
      }

      const isRoundTrip = document.getElementById('roundTrip').checked;
      const dailyCommuteFuelCost = isRoundTrip ? currentFuelCost : currentFuelCost * 2;

      const saving2 = rule2Days * dailyCommuteFuelCost;
      const saving5 = rule5Days * dailyCommuteFuelCost;

      document.getElementById('weekdayCountText').textContent = `${formatNumber(weekdays)} 일`;
      document.getElementById('rule2DaysText').textContent = useRule2 ? `${formatNumber(rule2Days)} 일` : '-';
      document.getElementById('rule5DaysText').textContent = useRule5 ? `${formatNumber(rule5Days)} 일` : '-';
      document.getElementById('saving2Text').textContent = useRule2 ? `${formatNumber(Math.round(saving2))} 원` : '-';
      document.getElementById('saving5Text').textContent = useRule5 ? `${formatNumber(Math.round(saving5))} 원` : '-';
    }

    document.addEventListener('click', function(e) {
      const startInput = document.getElementById('startAddress');
      const goalInput = document.getElementById('goalAddress');
      const startBox = document.getElementById('startSuggestions');
      const goalBox = document.getElementById('goalSuggestions');

      if (!startInput.contains(e.target) && !startBox.contains(e.target)) hideSuggestions('start');
      if (!goalInput.contains(e.target) && !goalBox.contains(e.target)) hideSuggestions('goal');
    });

    document.getElementById('roundTrip').addEventListener('change', function() {
      if (currentRouteDistanceKm > 0) {
        calculateFuelCost();
      }
    });

    initMap();
  </script>
</body>
</html>
