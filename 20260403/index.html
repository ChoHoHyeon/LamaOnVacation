<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자동차 경로·유류비 계산기</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f5f7fb;
      color: #222;
    }
    .app { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; }
    .panel { background: #fff; border-right: 1px solid #e5e7eb; padding: 20px; overflow-y: auto; }
    .map-wrap { position: relative; background: #eef2f7; }
    #map { width: 100%; height: 100vh; }
    h1 { margin: 0 0 16px; font-size: 24px; text-align: center; font-weight: 700; letter-spacing: -0.3px; color: #111827; }
    h2 { margin: 2px 0 10px; font-size: 18px; border-left: 4px solid #22c55e; padding-left: 8px; }
    .desc { font-size: 13px; line-height: 1.55; color: #555; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .row { display: flex; gap: 8px; }
    input[type="text"], input[type="number"], input[type="date"], select {
      width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; background: #fff;
    }
    input[readonly] { background: #f9fafb; }
    button { border: none; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-search { background: #22c55e; color: white; }
    .btn-route { background: #2563eb; color: white; width: 100%; }
    .btn-calc { background: #111827; color: white; width: 100%; }
    .btn-sub { background: #6b7280; color: white; width: 100%; }

    .result-box {
      background: #f1f3f6;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      margin-top: 10px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
    }

    .result-item { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px dashed #e5e7eb; font-size: 14px; }
    .result-item:last-child { border-bottom: none; }
    .btn-group { display: flex; gap: 8px; margin-top: 10px; }

    .metrics-animated {
      opacity: 1;
      transform: translateY(0);
      transition: opacity .35s ease, transform .35s ease;
    }
    .metrics-animated.show {
      opacity: 1;
      transform: translateY(0);
    }

    .route-status {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%) translateY(-8px);
      background: rgba(17, 24, 39, 0.88); color: #fff; padding: 10px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,.18);
      opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; z-index: 30; white-space: nowrap;
    }
    .route-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .map-hint {
      position: absolute; bottom: 18px; left: 18px; background: rgba(255,255,255,.92);
      color: #374151; font-size: 12px; padding: 9px 12px; border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08); z-index: 20; backdrop-filter: blur(6px); max-width: 430px;
    }

    @media (max-width: 960px) {
      .app { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid #e5e7eb; }
      #map { height: 60vh; }
      .route-status { max-width: calc(100% - 24px); overflow: hidden; text-overflow: ellipsis; }
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .compact-field { margin-bottom: 8px; }
    .compact-check { margin-top: 6px; }
    .compact-check label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      margin: 0;
    }

    @media (max-width: 960px) {
      .form-grid-2 { grid-template-columns: 1fr; gap: 8px; }
    }

    .section-card {
      background: linear-gradient(180deg, #ffffff 0%, #f9fafb 100%);
      border-radius: 16px;
      padding: 14px 16px 16px;
      margin-bottom: 18px;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04), 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      text-align: center;
      align-items: start;
    }

    .result-col { padding: 6px 4px; }
    .result-col .label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    .result-col .value { font-size: 16px; font-weight: 700; color: #111827; line-height: 1.2; }
    .result-single { text-align: center; margin-bottom: 8px; }
    .result-grid-2 { display: grid; grid-template-columns: 1fr 1fr; text-align: center; margin-top: 6px; gap: 8px; }
    .result-single .label { font-size: 12px; color: #6b7280; margin-bottom: 2px; }
    .result-single .value { font-size: 16px; font-weight: 700; color: #111827; }

    .rule-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 10px 0 14px;
      flex-wrap: wrap;
    }

    .rule-check-group {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .rule-check-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      margin: 0;
    }

    .digit-inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .digit-label {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
    }

    .digit-inline select {
      width: 72px;
      min-width: 0;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .date-row .field { margin-bottom: 0; }
    .date-row input[type="date"] { width: 100%; min-width: 0; }

    .suggestion-box {
      display: none;
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      margin-top: 4px;
      box-shadow: 0 12px 24px rgba(0,0,0,.10);
      z-index: 1000;
      max-height: 280px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f1f5f9;
      cursor: pointer;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover,
    .suggestion-item.active { background: #f8fafc; }
    .suggestion-title { font-size: 14px; color: #111827; }
    .suggestion-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .suggestion-badges { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
    .suggestion-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }
    .badge-juso { background: #eff6ff; color: #1d4ed8; }
    .badge-google { background: #ecfdf5; color: #047857; }
    .badge-naver { background: #f0fdf4; color: #15803d; }

    .tip-box {
      margin-top: 10px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.55;
    }

    .config-box {
      margin-top: 10px;
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.55;
    }
  </style>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=s95475emm3&submodules=geocoder"></script>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>자동차 경로·유류비 계산기</h1>

      <div class="section-card">
        <h2>1. 주소 검색 및 경로 표시</h2>

        <div class="field">
          <label for="startAddress">거주지 주소</label>
          <div class="row" style="position:relative;">
            <div style="flex:1; position:relative;">
              <input id="startAddress" type="text" placeholder="예: 서울 강남구 테헤란로 152 / 잠실역 / 스타벅스 강남 / 성남시 분당구 정자동" autocomplete="off" />
              <div id="startSuggestions" class="suggestion-box"></div>
            </div>
            <button class="btn-search" type="button" onclick="searchStart()">검색</button>
          </div>
        </div>

        <div class="field">
          <label for="goalAddress">목적지 주소</label>
          <div class="row" style="position:relative;">
            <div style="flex:1; position:relative;">
              <input id="goalAddress" type="text" placeholder="예: 부산역 / 서울시청 / 대전 유성구 대학로 99 / 올림픽공원" autocomplete="off" />
              <div id="goalSuggestions" class="suggestion-box"></div>
            </div>
            <button class="btn-search" type="button" onclick="searchGoal()">검색</button>
          </div>
        </div>

        
        <div class="field" style="display:none;">
          <label>선택된 좌표</label>
          <input id="coordInfo" type="text" readonly value="출발지와 목적지를 검색하면 표시됩니다." />
        </div>

        <div class="field" style="margin-top:12px;">
          <button class="btn-route" type="button" onclick="drawDrivingRoute()">자동차 경로 표시</button>
        </div>

        <div class="btn-group">
          <button id="editRouteBtn" class="btn-sub" type="button" onclick="toggleEditRoute()">선편집</button>
          <button class="btn-sub" type="button" onclick="resetEditRoute()">편집 초기화</button>
        </div>

        <div id="routeSummaryBox" class="result-box metrics-animated">
          <div class="result-item"><span>거리</span><strong id="distanceText">-</strong></div>
        </div>
      </div>

      <div class="section-card">
        <h2>2. 유류비 계산</h2>

        <div class="form-grid-2">
          <div class="field compact-field">
            <label for="efficiency">연비</label>
            <input id="efficiency" type="number" min="0.1" step="0.1" value="12.0" placeholder="km/L 또는 km/kWh" />
          </div>

          <div class="field compact-field">
            <label for="fuelType">유종</label>
            <select id="fuelType">
              <option value="휘발유" selected>휘발유</option>
              <option value="경유">경유</option>
              <option value="LPG">LPG</option>
              <option value="전기">전기(참고용)</option>
            </select>
          </div>

          <div class="field compact-field">
            <label for="fuelPrice">현재 연료 가격</label>
            <input id="fuelPrice" type="number" min="0" step="1" value="1700" placeholder="원/L 또는 원/kWh" />
          </div>
        </div>

        <div class="compact-check">
          <label>
            <input type="checkbox" id="roundTrip" />
            왕복 계산
          </label>
        </div>

        <div class="field">
          <button class="btn-calc" type="button" onclick="calculateFuelCost()">유류비 계산하기</button>
        </div>

        <div id="fuelSummaryBox" class="result-box metrics-animated">
          <div class="result-grid">
            <div class="result-col">
              <div class="label" id="tripDistanceLabel">편도 거리</div>
              <div class="value" id="tripDistanceText">-</div>
            </div>
            <div class="result-col">
              <div class="label">연료</div>
              <div class="value" id="usedFuelText">-</div>
            </div>
            <div class="result-col">
              <div class="label">유류비</div>
              <div class="value" id="fuelCostText">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-card">
        <h2>3. 2부제 / 5부제 절감비용 계산</h2>

        <div class="desc">
          <b>평일 기준</b> <b>1일 유류비(왕복)</b> 기준으로 산정합니다.
        </div>

        <div class="rule-top-row">
          <div class="rule-check-group">
            <label><input type="checkbox" id="rule2" /> 2부제</label>
            <label><input type="checkbox" id="rule5" /> 5부제</label>
          </div>

          <div class="digit-inline">
            <span class="digit-label">자동차 끝번호</span>
            <select id="carLastDigit">
              <option value="">선택</option>
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
            </select>
          </div>
        </div>

        <div class="date-row">
          <div class="field compact-field">
            <label for="startDate">시작 날짜</label>
            <input id="startDate" type="date" />
          </div>
          <div class="field compact-field">
            <label for="endDate">종료 날짜</label>
            <input id="endDate" type="date" />
          </div>
        </div>

        <div class="field">
          <button class="btn-calc" type="button" onclick="calculateSaving()">절감비용 계산하기</button>
        </div>

        <div class="result-box">
          <div class="result-single">
            <div class="label">평일수</div>
            <div class="value" id="weekdayCountText">-</div>
          </div>

          <div class="result-grid-2">
            <div class="result-col">
              <div class="label">2부제 적용일수</div>
              <div class="value" id="rule2DaysText">-</div>
            </div>
            <div class="result-col">
              <div class="label">5부제 적용일수</div>
              <div class="value" id="rule5DaysText">-</div>
            </div>
          </div>

          <div class="result-grid-2">
            <div class="result-col">
              <div class="label">2부제 절감액</div>
              <div class="value" id="saving2Text">-</div>
            </div>
            <div class="result-col">
              <div class="label">5부제 절감액</div>
              <div class="value" id="saving5Text">-</div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <div id="routeStatus" class="route-status">경로를 계산 중입니다...</div>
      <div class="map-hint">선편집 시: 노란점은 큰 흐름 조정, 진한 파란점은 기존 세부점 재수정, 연한 파란점은 새 세부점 추가용입니다.</div>
    </section>
  </div>

  <script>

    function loadGooglePlacesLibrary() {

    function nextPointId() { return `point-${pointIdCounter++}`; }
    function formatNumber(value) { return Number(value || 0).toLocaleString('ko-KR'); }

    function normalizePoint(point) {
      if (point instanceof naver.maps.LatLng) return point;
      const lat = typeof point.lat === 'function' ? point.lat() : (point.y ?? point.lat);
      const lng = typeof point.lng === 'function' ? point.lng() : (point.x ?? point.lng);
      return new naver.maps.LatLng(lat, lng);
    }

    function normalizePath(points) { return points.map(normalizePoint); }

    function interpolateLatLng(startPoint, endPoint, ratio) {
      const start = normalizePoint(startPoint);
      const end = normalizePoint(endPoint);
      return new naver.maps.LatLng(
        start.lat() + (end.lat() - start.lat()) * ratio,
        start.lng() + (end.lng() - start.lng()) * ratio
      );
    }

    function getStartLatLng() { return new naver.maps.LatLng(startCoord.lat, startCoord.lng); }
    function getGoalLatLng() { return new naver.maps.LatLng(goalCoord.lat, goalCoord.lng); }

    function getControlPoints() {
      if (!startCoord || !goalCoord) return [];
      return [getStartLatLng(), ...intermediatePoints.map(item => normalizePoint(item.coord)), getGoalLatLng()];
    }

    function getBoundsFromPath(points) {
      const bounds = new naver.maps.LatLngBounds();
      normalizePath(points).forEach(point => bounds.extend(point));
      return bounds;
    }

    function getDistanceMeters(p1, p2) {
      const point1 = normalizePoint(p1);
      const point2 = normalizePoint(p2);
      const lat1 = point1.lat();
      const lng1 = point1.lng();
      const lat2 = point2.lat();
      const lng2 = point2.lng();

      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function getSmoothPath(points, samplesPerSegment = 16) {
      const pts = normalizePath(points);
      if (pts.length < 2) return pts;
      const result = [];

      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(0, i - 1)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(pts.length - 1, i + 2)];

        for (let j = 0; j < samplesPerSegment; j++) {
          const t = j / samplesPerSegment;
          const t2 = t * t;
          const t3 = t2 * t;

          const lat = 0.5 * ((2 * p1.lat()) + (-p0.lat() + p2.lat()) * t + (2 * p0.lat() - 5 * p1.lat() + 4 * p2.lat() - p3.lat()) * t2 + (-p0.lat() + 3 * p1.lat() - 3 * p2.lat() + p3.lat()) * t3);
          const lng = 0.5 * ((2 * p1.lng()) + (-p0.lng() + p2.lng()) * t + (2 * p0.lng() - 5 * p1.lng() + 4 * p2.lng() - p3.lng()) * t2 + (-p0.lng() + 3 * p1.lng() - 3 * p2.lng() + p3.lng()) * t3);
          result.push(new naver.maps.LatLng(lat, lng));
        }
      }

      result.push(pts[pts.length - 1]);
      return result;
    }

    function getCurvePointOnSegment(points, index, t = 0.5) {
      const pts = normalizePath(points);
      if (pts.length < 2 || index < 0 || index >= pts.length - 1) return null;
      const p0 = pts[Math.max(0, index - 1)];
      const p1 = pts[index];
      const p2 = pts[index + 1];
      const p3 = pts[Math.min(pts.length - 1, index + 2)];
      const t2 = t * t;
      const t3 = t2 * t;
      const lat = 0.5 * ((2 * p1.lat()) + (-p0.lat() + p2.lat()) * t + (2 * p0.lat() - 5 * p1.lat() + 4 * p2.lat() - p3.lat()) * t2 + (-p0.lat() + 3 * p1.lat() - 3 * p2.lat() + p3.lat()) * t3);
      const lng = 0.5 * ((2 * p1.lng()) + (-p0.lng() + p2.lng()) * t + (2 * p0.lng() - 5 * p1.lng() + 4 * p2.lng() - p3.lng()) * t2 + (-p0.lng() + 3 * p1.lng() - 3 * p2.lng() + p3.lng()) * t3);
      return new naver.maps.LatLng(lat, lng);
    }

    function updateCoordInfo() {
      const startText = startCoord ? `출발: ${startCoord.lat.toFixed(6)}, ${startCoord.lng.toFixed(6)}` : '출발: -';
      const goalText = goalCoord ? `목적지: ${goalCoord.lat.toFixed(6)}, ${goalCoord.lng.toFixed(6)}` : '목적지: -';

    function normalizeSearchKeyword(text) {
      return (text || '')
        .trim()
        .replace(/\s+/g, ' ')
        .replace(/[()\[\]{}]/g, '')
        .replace(/,/g, ' ')
        .trim();
    }

    function stripSpecialForComparison(text) {
      return normalizeSearchKeyword(text).replace(/\s/g, '').toLowerCase();
    }

    function expandRegionPrefix(query) {
      const text = normalizeSearchKeyword(query);
      if (!text) return text;
      const firstToken = text.split(' ')[0];
      const mapped = REGION_PREFIX_MAP[firstToken];
      if (!mapped) return text;
      return text.replace(firstToken, mapped);
    }

    function buildLooseVariants(query) {
      const text = normalizeSearchKeyword(query);
      if (!text) return [];
      const variants = [text, expandRegionPrefix(text)];

      const compact = text.replace(/\s/g, '');
      if (compact !== text) variants.push(compact);

      const spaced = compact
        .replace(/(특별시|광역시|특별자치시|특별자치도|도)(?=[가-힣])/g, '$1 ')
        .replace(/(시|군|구)(?=[가-힣])/g, '$1 ')
        .replace(/(읍|면|동|리|로|길)(?=[0-9가-힣])/g, '$1 ')
        .replace(/\s+/g, ' ')
        .trim();
      if (spaced && spaced !== text) variants.push(spaced);

      return [...new Set(variants.filter(Boolean))];
    }

    function findAliasMatches(query) {
      const q = stripSpecialForComparison(query);
      if (!q) return [];
      return PLACE_ALIASES.filter(item => {
        const keyword = stripSpecialForComparison(item.keyword);
        const address = stripSpecialForComparison(item.address);
        const label = stripSpecialForComparison(item.label || '');
        return keyword.includes(q) || address.includes(q) || label.includes(q) || q.includes(keyword);
      });
    }

    function buildSearchCandidates(rawInput) {
      const input = normalizeSearchKeyword(rawInput);
      if (!input) return [];
      const variants = buildLooseVariants(input);
      const aliasMatches = findAliasMatches(input);
      const queries = [];

      aliasMatches.forEach(item => queries.push(item.address));
      variants.forEach(v => queries.push(v));

      if (/^[가-힣]+구\s+[가-힣]+로$/.test(input) || /^[가-힣]+시\s+[가-힣]+로$/.test(input)) {
        queries.push(input + ' 1');
      }

      if (/^[가-힣]+동$/.test(input)) {
        queries.push(input);
      }

      return [...new Set(queries.filter(Boolean))];
    }

    function geocodeQuery(query) {
      return new Promise((resolve) => {
        naver.maps.Service.geocode({ query }, function(status, response) {
          if (
            status === naver.maps.Service.Status.OK &&
            response.v2 &&
            response.v2.addresses &&
            response.v2.addresses.length > 0
          ) {
            resolve(response.v2.addresses);
          } else {
            resolve([]);
          }
        });
      });
    }

    function summarizeAddressItem(item, fallbackQuery = '') {
      const road = item.roadAddress || '';
      const jibun = item.jibunAddress || '';
      return {
        id: createSuggestionId(),
        source: 'naver',
        label: road || jibun || fallbackQuery,
        address: road || jibun || fallbackQuery,
        sub: road && jibun ? `지번: ${jibun}` : (jibun || ''),
        lat: item.y ? parseFloat(item.y) : null,
        lng: item.x ? parseFloat(item.x) : null
      };
    }

    function createSuggestionId() {
      return 'sg_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function callJusoSearch(keyword, countPerPage = 5) {
      return new Promise((resolve) => {
        const confmKey = (SEARCH_CONFIG.JUSO_CONFM_KEY || '').trim();
        if (!confmKey || confmKey.includes('여기에_')) {
          resolve([]);
          return;
        }

        const callbackName = '__jusoJsonpCallback_' + (++jusoJsonpSeq);
        window[callbackName] = function(data) {
          try {
            const items = data?.results?.juso || [];
            const normalized = items.map(item => ({
              id: createSuggestionId(),
              source: 'juso',
              label: item.roadAddr || item.jibunAddr || item.roadAddrPart1 || keyword,
              address: item.roadAddr || item.jibunAddr || item.roadAddrPart1 || keyword,
              sub: [item.zipNo ? `우편번호 ${item.zipNo}` : '', item.jibunAddr ? `지번: ${item.jibunAddr}` : ''].filter(Boolean).join(' · '),
              roadAddr: item.roadAddr || '',
              jibunAddr: item.jibunAddr || '',
              zipNo: item.zipNo || '',
              admCd: item.admCd || '',
              rnMgtSn: item.rnMgtSn || '',
              udrtYn: item.udrtYn || '',
              buldMnnm: item.buldMnnm || '',
              buldSlno: item.buldSlno || ''
            }));
            resolve(normalized);
          } finally {
            cleanup();
          }
        };

        function cleanup() {
          try { delete window[callbackName]; } catch (e) {}
          const script = document.getElementById(callbackName);
          if (script) script.remove();
        }

        const params = new URLSearchParams({
          confmKey,
          currentPage: '1',
          countPerPage: String(countPerPage),
          keyword,
          resultType: 'json'
        });

        const script = document.createElement('script');
        script.id = callbackName;
        script.src = `https://business.juso.go.kr/addrlink/addrLinkApiJsonp.do?${params.toString()}&callback=${callbackName}`;
        script.onerror = function() {
          cleanup();
          resolve([]);
        };
        document.body.appendChild(script);
      });
    }

    function getGooglePredictions(input) {
      return new Promise((resolve) => {
        if (!googleReady || !googleAutocompleteService) {
          resolve([]);
          return;
        }

        googleAutocompleteService.getPlacePredictions(
          {
            input,
            componentRestrictions: { country: 'kr' },
            language: SEARCH_CONFIG.GOOGLE_LANGUAGE
          },
          function(predictions, status) {
            if (!predictions || status !== google.maps.places.PlacesServiceStatus.OK) {
              resolve([]);
              return;
            }

            resolve(predictions.slice(0, 5).map(item => ({
              id: createSuggestionId(),
              source: 'google',
              label: item.structured_formatting?.main_text || item.description,
              address: item.description,
              sub: item.structured_formatting?.secondary_text || 'Google 장소 검색',
              placeId: item.place_id
            })));
          }
        );
      });
    }

    function getGooglePlaceDetails(placeId) {
      return new Promise((resolve) => {
        if (!googleReady || !googlePlacesService || !placeId) {
          resolve(null);
          return;
        }

        googlePlacesService.getDetails(
          {
            placeId,
            fields: ['name', 'formatted_address', 'geometry']
          },
          function(place, status) {
            if (!place || status !== google.maps.places.PlacesServiceStatus.OK) {
              resolve(null);
              return;
            }

            resolve({
              address: place.formatted_address || place.name || '',
              label: place.name || place.formatted_address || '',
              lat: place.geometry?.location?.lat ? place.geometry.location.lat() : null,
              lng: place.geometry?.location?.lng ? place.geometry.location.lng() : null
            });
          }
        );
      });
    }

    async function getSuggestionItems(rawInput) {
      const input = normalizeSearchKeyword(rawInput);
      if (!input) return [];

      const queries = buildSearchCandidates(input).slice(0, 3);
      const aliasMatches = findAliasMatches(input).slice(0, 4).map(item => ({
        id: createSuggestionId(),
        source: 'naver',
        label: item.label,
        address: item.address,
        sub: `추천 장소 · ${item.address}`
      }));

      const [jusoItems, googleItems] = await Promise.all([
        callJusoSearch(input, 5),
        getGooglePredictions(input)
      ]);

      const naverItems = [];
      for (const q of queries) {
        const addresses = await geocodeQuery(q);
        addresses.slice(0, 2).forEach(item => {
          naverItems.push(summarizeAddressItem(item, q));
        });
      }

      const merged = [];
      const seen = new Set();
      [...googleItems, ...jusoItems, ...aliasMatches, ...naverItems].forEach(item => {
        const key = `${stripSpecialForComparison(item.label)}|${stripSpecialForComparison(item.address)}`;
        if (!seen.has(key) && item.address) {
          seen.add(key);
          merged.push(item);
        }
      });

      if (merged.length === 0 && input.length >= 2) {
        merged.push({
          id: createSuggestionId(),
          source: 'naver',
          label: `입력값으로 검색: ${input}`,
          address: input,
          sub: '검색 버튼을 누르거나 선택해서 바로 검색'
        });
      }

      return merged.slice(0, 10);
    }

    function hideSuggestions(type) {
      const box = document.getElementById(type === 'start' ? 'startSuggestions' : 'goalSuggestions');
      box.style.display = 'none';
      box.innerHTML = '';
      inputState[type].activeIndex = -1;
      inputState[type].items = [];
    }

    async function selectSuggestion(type, index) {
      const item = inputState[type].items[index];
      if (!item) return;

      const input = document.getElementById(type === 'start' ? 'startAddress' : 'goalAddress');
      input.value = item.address || item.label || '';
      hideSuggestions(type);

      if (item.source === 'google' && item.placeId) {
        const detail = await getGooglePlaceDetails(item.placeId);
        if (detail?.lat != null && detail?.lng != null) {
          applyResolvedLocation(type, {
            address: detail.address,
            label: detail.label,
            lat: detail.lat,
            lng: detail.lng
          });
          return;
        }
      }

      if (item.lat != null && item.lng != null) {
        applyResolvedLocation(type, item);
        return;
      }

      searchAddress(item.address || item.label || '', type);
    }

    function sourceBadgeClass(source) {
      if (source === 'juso') return 'badge-juso';
      if (source === 'google') return 'badge-google';
      return 'badge-naver';
    }

    function sourceBadgeLabel(source) {
      if (source === 'juso') return '행안부 주소';
      if (source === 'google') return 'Google 장소';
      return 'Naver 보정';
    }

    function renderSuggestions(type, items) {
      const box = document.getElementById(type === 'start' ? 'startSuggestions' : 'goalSuggestions');
      inputState[type].items = items;
      inputState[type].activeIndex = -1;

      if (!items || items.length === 0) {
        hideSuggestions(type);
        return;
      }

      box.innerHTML = items.map((item, index) => {
        const title = item.label || item.address;
        const sub = item.sub || '';
        const badgeClass = sourceBadgeClass(item.source);
        const badgeLabel = sourceBadgeLabel(item.source);
        return `
          <div class="suggestion-item" data-index="${index}" onclick="selectSuggestion('${type}', ${index})">
            <div class="suggestion-title">${escapeHtml(title)}</div>
            ${sub ? `<div class="suggestion-sub">${escapeHtml(sub)}</div>` : ''}
            <div class="suggestion-badges"><span class="suggestion-badge ${badgeClass}">${badgeLabel}</span></div>
          </div>
        `;
      }).join('');
      box.style.display = 'block';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function moveSuggestionFocus(type, direction) {
      const items = inputState[type].items;
      const box = document.getElementById(type === 'start' ? 'startSuggestions' : 'goalSuggestions');
      if (!items.length || box.style.display === 'none') return;

      inputState[type].activeIndex += direction;
      if (inputState[type].activeIndex < 0) inputState[type].activeIndex = items.length - 1;
      if (inputState[type].activeIndex >= items.length) inputState[type].activeIndex = 0;

      [...box.querySelectorAll('.suggestion-item')].forEach(el => el.classList.remove('active'));
      const active = box.querySelector(`.suggestion-item[data-index="${inputState[type].activeIndex}"]`);
      if (active) {
        active.classList.add('active');
        active.scrollIntoView({ block: 'nearest' });
      }
    }

    async function chooseActiveSuggestion(type) {
      const items = inputState[type].items;
      const index = inputState[type].activeIndex;
      if (index >= 0 && items[index]) {
        await selectSuggestion(type, index);
        return true;
      }
      return false;
    }

    async function handleAddressInput(type) {
      const input = document.getElementById(type === 'start' ? 'startAddress' : 'goalAddress');
      const rawQuery = input.value.trim();
      clearTimeout(suggestTimer);

      if (rawQuery.length < 1) {
        hideSuggestions(type);
        return;
      }

      suggestTimer = setTimeout(async () => {
        const items = await getSuggestionItems(rawQuery);
        renderSuggestions(type, items);
      }, 180);
    }

    function applyResolvedLocation(type, payload) {
      const lat = parseFloat(payload.lat);
      const lng = parseFloat(payload.lng);
      if (Number.isNaN(lat) || Number.isNaN(lng)) return;

      const latlng = new naver.maps.LatLng(lat, lng);
      const addressText = payload.address || payload.label || '';

      if (type === 'start') {
        startCoord = { lat, lng, address: addressText };
        if (startMarker) startMarker.setMap(null);
        startMarker = new naver.maps.Marker({ position: latlng, map, title: '출발지', icon: createMarkerIcon('#ef4444') });
        document.getElementById('startAddress').value = addressText;
      } else {
        goalCoord = { lat, lng, address: addressText };
        if (goalMarker) goalMarker.setMap(null);
        goalMarker = new naver.maps.Marker({ position: latlng, map, title: '목적지', icon: createMarkerIcon('#ef4444') });
        document.getElementById('goalAddress').value = addressText;
      }

      updateCoordInfo();
      map.setCenter(latlng);
    }

    function applyGeocodeResult(item, type, originalQuery) {
      const lat = parseFloat(item.y);
      const lng = parseFloat(item.x);
      const latlng = new naver.maps.LatLng(lat, lng);
      const addressText = item.roadAddress || item.jibunAddress || originalQuery;

      if (type === 'start') {
        startCoord = { lat, lng, address: addressText };
        if (startMarker) startMarker.setMap(null);
        startMarker = new naver.maps.Marker({ position: latlng, map, title: '출발지', icon: createMarkerIcon('#ef4444') });
        document.getElementById('startAddress').value = addressText;
      } else {
        goalCoord = { lat, lng, address: addressText };
        if (goalMarker) goalMarker.setMap(null);
        goalMarker = new naver.maps.Marker({ position: latlng, map, title: '목적지', icon: createMarkerIcon('#ef4444') });
        document.getElementById('goalAddress').value = addressText;
      }

      updateCoordInfo();
      map.setCenter(latlng);
    }

    async function searchAddress(address, type) {
      const rawInput = normalizeSearchKeyword(address);
      if (!rawInput) {
        alert(type === 'start' ? '거주지 주소를 입력하세요.' : '목적지 주소를 입력하세요.');
        return;
      }

      hideSuggestions(type);

      const googlePredictions = await getGooglePredictions(rawInput);
      if (googlePredictions.length > 0 && googlePredictions[0].placeId) {
        const googleDetail = await getGooglePlaceDetails(googlePredictions[0].placeId);
        if (googleDetail?.lat != null && googleDetail?.lng != null) {
          applyResolvedLocation(type, googleDetail);
          return;
        }
      }

      const jusoItems = await callJusoSearch(rawInput, 3);
      for (const item of jusoItems) {
        const geocodeCandidates = [item.roadAddr, item.address, item.jibunAddr].filter(Boolean);
        for (const q of geocodeCandidates) {
          const results = await geocodeQuery(q);
          if (results.length > 0) {
            applyGeocodeResult(results[0], type, q);
            return;
          }
        }
      }

      const tryQueries = buildSearchCandidates(rawInput);
      for (const query of tryQueries) {
        const results = await geocodeQuery(query);
        if (results.length > 0) {
          applyGeocodeResult(results[0], type, query);
          return;
        }
      }

      alert('검색 결과가 없습니다.\n도로명 + 건물번호, 지번주소, 역명, 관공서명, 업체명처럼 조금 더 구체적으로 입력해보세요.');
    }

    function searchStart() { searchAddress(document.getElementById('startAddress').value, 'start'); }
    function searchGoal() { searchAddress(document.getElementById('goalAddress').value, 'goal'); }

    function buildDefaultRouteState() {
      const startPoint = getStartLatLng();
      const goalPoint = getGoalLatLng();
      intermediatePoints = DEFAULT_MAIN_RATIOS.map((ratio, index) => ({
        id: `main-${index + 1}`,
        type: 'main',
        label: String(index + 1),
        level: 0,
        coord: interpolateLatLng(startPoint, goalPoint, ratio)
      }));
    }

    function clearAllEditMarkers() {
      mainMarkers.forEach(marker => marker.setMap(null));
      detailPointMarkers.forEach(marker => marker.setMap(null));
      detailHandleMarkers.forEach(marker => marker.setMap(null));
      mainMarkers = [];
      detailPointMarkers = [];
      detailHandleMarkers = [];
    }

    function stopRouteAnimation() {
      if (routeAnimTimer) {
        clearInterval(routeAnimTimer);
        routeAnimTimer = null;
      }
    }

    function clearRoutePolylines() {
      stopRouteAnimation();
      if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
      if (routeShadowPolyline) { routeShadowPolyline.setMap(null); routeShadowPolyline = null; }
    }

    function renderStaticRoute() {
      const controlPoints = getControlPoints();
      if (controlPoints.length < 2) return;
      const smoothPath = getSmoothPath(controlPoints);
      clearRoutePolylines();

      routeShadowPolyline = new naver.maps.Polyline({
        map,
        path: smoothPath,
        strokeColor: 'rgba(15, 23, 42, 0.20)',
        strokeWeight: 12,
        strokeOpacity: 1
      });

      routePolyline = new naver.maps.Polyline({
        map,
        path: smoothPath,
        strokeColor: '#ef4444',
        strokeWeight: 8,
        strokeOpacity: 0.96
      });
    }

    function animateRoute() {
      const controlPoints = getControlPoints();
      if (controlPoints.length < 2) return;
      const smoothPath = getSmoothPath(controlPoints);
      clearRoutePolylines();
      resetMetricAnimation();

      const bounds = getBoundsFromPath(controlPoints);
      map.fitBounds(bounds);
      showRouteStatus('경로를 계산 중입니다...');

      setTimeout(() => {
        routeShadowPolyline = new naver.maps.Polyline({
          map,
          path: smoothPath,
          strokeColor: 'rgba(15, 23, 42, 0.16)',
          strokeWeight: 12,
          strokeOpacity: 1
        });

        routePolyline = new naver.maps.Polyline({
          map,
          path: [smoothPath[0]],
          strokeColor: '#ef4444',
          strokeWeight: 8,
          strokeOpacity: 0.96
        });

        showRouteStatus('자동차 경로를 표시하는 중입니다...');
        let stepIndex = 1;
        routeAnimTimer = setInterval(() => {
          routePolyline.setPath(smoothPath.slice(0, stepIndex + 1));
          stepIndex += 1;
          if (stepIndex >= smoothPath.length) {
            stopRouteAnimation();
            updateRouteSummary();
            revealMetricAnimation();
            showRouteStatus('경로 표시가 완료되었습니다.');
            setTimeout(() => hideRouteStatus(), 900);
          }
        }, 35);
      }, 320);
    }

    function updateRouteSummary() {
      const smoothPath = getSmoothPath(getControlPoints());
      if (smoothPath.length < 2) return;

      let totalDistanceM = 0;
      for (let i = 0; i < smoothPath.length - 1; i++) {
        totalDistanceM += getDistanceMeters(smoothPath[i], smoothPath[i + 1]);
      }
      totalDistanceM *= ROUTE_DETOUR_FACTOR;
      currentRouteDistanceKm = totalDistanceM / 1000;

      document.getElementById('distanceText').textContent = `${currentRouteDistanceKm.toFixed(2)} km`;
      document.getElementById('tripDistanceText').textContent = `${currentRouteDistanceKm.toFixed(2)} km`;

      const efficiency = parseFloat(document.getElementById('efficiency').value);
      const fuelPrice = parseFloat(document.getElementById('fuelPrice').value);
      if (efficiency > 0 && !Number.isNaN(fuelPrice) && fuelPrice >= 0) {
        const fuelType = document.getElementById('fuelType').value;
        const usedFuel = currentRouteDistanceKm / efficiency;
        currentFuelCost = usedFuel * fuelPrice;
        document.getElementById('usedFuelText').textContent = fuelType === '전기' ? `${usedFuel.toFixed(2)} kWh` : `${usedFuel.toFixed(2)} L`;
        document.getElementById('fuelCostText').textContent = `${formatNumber(Math.round(currentFuelCost))} 원`;
      }
    }

    function refreshEditMarkers() {
      clearAllEditMarkers();
      if (!isEditMode) return;

      intermediatePoints.forEach((point) => {
        const coord = normalizePoint(point.coord);

        if (point.type === 'main') {
          const marker = new naver.maps.Marker({
            position: coord,
            map,
            draggable: true,
            title: `편집 포인트 ${point.label}`,
            icon: createMainPointIcon(point.label)
          });

          naver.maps.Event.addListener(marker, 'drag', function(e) {
            point.coord = e.coord;
            renderStaticRoute();
          });

          naver.maps.Event.addListener(marker, 'dragend', function(e) {
            point.coord = e.coord;
            renderStaticRoute();
            updateRouteSummary();
            refreshEditMarkers();
          });

          mainMarkers.push(marker);
        } else {
          if (!point.level) point.level = 1;

          const marker = new naver.maps.Marker({
            position: coord,
            map,
            draggable: true,
            title: `세부 조정 포인트 (단계 ${point.level || 1})`,
            icon: createDetailPointIcon(point.level || 1)
          });

          naver.maps.Event.addListener(marker, 'drag', function(e) {
            point.coord = e.coord;
            renderStaticRoute();
          });

          naver.maps.Event.addListener(marker, 'dragend', function(e) {
            point.coord = e.coord;
            renderStaticRoute();
            updateRouteSummary();
            refreshEditMarkers();
          });

          detailPointMarkers.push(marker);
        }
      });

      createDetailHandles();
    }

    function createDetailHandles() {
      detailHandleMarkers.forEach(marker => marker.setMap(null));
      detailHandleMarkers = [];
      if (!isEditMode) return;

      const fullPoints = getControlPoints();
      if (fullPoints.length < 2) return;

      for (let segmentIndex = 0; segmentIndex < fullPoints.length - 1; segmentIndex++) {
        const leftPoint = segmentIndex === 0 ? null : intermediatePoints[segmentIndex - 1];
        const rightPoint = segmentIndex >= intermediatePoints.length ? null : intermediatePoints[segmentIndex];

        let nextLevel = 1;
        if (leftPoint && rightPoint) nextLevel = Math.max(leftPoint.level || 1, rightPoint.level || 1) + 1;
        else if (leftPoint) nextLevel = (leftPoint.level || 1) + 1;
        else if (rightPoint) nextLevel = (rightPoint.level || 1) + 1;
        else nextLevel = 1;

        if (nextLevel > 3) continue;

        const mid = getCurvePointOnSegment(fullPoints, segmentIndex, 0.5);
        const insertIndex = segmentIndex;

        const marker = new naver.maps.Marker({
          position: mid,
          map,
          draggable: true,
          title: `새 세부 포인트 추가 (단계 ${nextLevel})`,
          icon: createDetailHandleIcon(nextLevel)
        });

        let insertedPoint = null;

        naver.maps.Event.addListener(marker, 'dragstart', function(e) {
          insertedPoint = { id: nextPointId(), type: 'detail', level: nextLevel, coord: e.coord };
          intermediatePoints.splice(insertIndex, 0, insertedPoint);
          renderStaticRoute();
        });

        naver.maps.Event.addListener(marker, 'drag', function(e) {
          if (!insertedPoint) return;
          insertedPoint.coord = e.coord;
          renderStaticRoute();
        });

        naver.maps.Event.addListener(marker, 'dragend', function(e) {
          if (!insertedPoint) return;
          insertedPoint.coord = e.coord;
          renderStaticRoute();
          updateRouteSummary();
          refreshEditMarkers();
        });

        detailHandleMarkers.push(marker);
      }
    }

    function drawDrivingRoute() {
      if (!startCoord || !goalCoord) {
        alert('출발지와 목적지를 먼저 검색하세요.');
        return;
      }
      isEditMode = false;
      document.getElementById('editRouteBtn').textContent = '선편집';
      clearAllEditMarkers();
      buildDefaultRouteState();
      animateRoute();
    }

    function toggleEditRoute() {
      if (!startCoord || !goalCoord || intermediatePoints.length === 0) {
        alert('먼저 자동차 경로 표시를 눌러 기본 경로를 만들어주세요.');
        return;
      }

      isEditMode = !isEditMode;
      const btn = document.getElementById('editRouteBtn');

      if (isEditMode) {
        renderStaticRoute();
        refreshEditMarkers();
        updateRouteSummary();
        btn.textContent = '편집완료';
        showRouteStatus('선편집 모드입니다. 노란점은 큰 흐름, 진한 파란점은 기존 세부점, 연한 파란점은 새 세부점 추가용입니다.');
        setTimeout(() => hideRouteStatus(), 1600);
      } else {
        clearAllEditMarkers();
        renderStaticRoute();
        updateRouteSummary();
        btn.textContent = '선편집';
      }
    }

    function resetEditRoute() {
      if (!startCoord || !goalCoord) {
        alert('출발지와 목적지를 먼저 검색하세요.');
        return;
      }

      buildDefaultRouteState();
      renderStaticRoute();
      updateRouteSummary();

      if (isEditMode) refreshEditMarkers();
      else clearAllEditMarkers();

      showRouteStatus('편집 경로가 기본 상태로 초기화되었습니다.');
      setTimeout(() => hideRouteStatus(), 900);
      revealMetricAnimation();
    }

    function calculateFuelCost() {
      if (!currentRouteDistanceKm || currentRouteDistanceKm <= 0) {
        alert('먼저 자동차 경로를 표시하세요.');
        return;
      }

      const efficiency = parseFloat(document.getElementById('efficiency').value);
      const fuelPrice = parseFloat(document.getElementById('fuelPrice').value);
      const fuelType = document.getElementById('fuelType').value;

      if (!efficiency || efficiency <= 0) {
        alert('연비를 올바르게 입력하세요.');
        return;
      }
      if (fuelPrice < 0 || Number.isNaN(fuelPrice)) {
        alert('연료 가격을 올바르게 입력하세요.');
        return;
      }

      const isRoundTrip = document.getElementById('roundTrip').checked;
      const appliedDistanceKm = isRoundTrip ? currentRouteDistanceKm * 2 : currentRouteDistanceKm;
      const usedFuel = appliedDistanceKm / efficiency;
      currentFuelCost = usedFuel * fuelPrice;

      document.getElementById('tripDistanceLabel').textContent = isRoundTrip ? '왕복 이동 거리' : '편도 이동 거리';
      document.getElementById('tripDistanceText').textContent = `${appliedDistanceKm.toFixed(2)} km`;
      document.getElementById('usedFuelText').textContent = fuelType === '전기' ? `${usedFuel.toFixed(2)} kWh` : `${usedFuel.toFixed(2)} L`;
      document.getElementById('fuelCostText').textContent = `${formatNumber(Math.round(currentFuelCost))} 원`;
      revealMetricAnimation();
    }

    function isRule2Restricted(date, lastDigit) {
      const dayOfMonth = date.getDate();
      return (dayOfMonth % 2) === (lastDigit % 2);
    }

    function isRule5Restricted(date, lastDigit) {
      const day = date.getDay();
      const ruleMap = { 1: [1, 6], 2: [2, 7], 3: [3, 8], 4: [4, 9], 5: [5, 0] };
      if (!ruleMap[day]) return false;
      return ruleMap[day].includes(lastDigit);
    }

    function calculateSaving() {
      if (!currentFuelCost || currentFuelCost <= 0) {
        alert('먼저 유류비를 계산하세요.');
        return;
      }

      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const useRule2 = document.getElementById('rule2').checked;
      const useRule5 = document.getElementById('rule5').checked;
      const carLastDigitValue = document.getElementById('carLastDigit').value;

      if (!startDate || !endDate) { alert('시작 날짜와 종료 날짜를 선택하세요.'); return; }
      if (startDate > endDate) { alert('종료 날짜는 시작 날짜보다 같거나 뒤여야 합니다.'); return; }
      if (!useRule2 && !useRule5) { alert('2부제 또는 5부제 중 하나 이상 선택하세요.'); return; }
      if (carLastDigitValue === '') { alert('자동차 끝번호를 선택하세요.'); return; }

      const carLastDigit = parseInt(carLastDigitValue, 10);
      let weekdays = 0, rule2Days = 0, rule5Days = 0;
      const current = new Date(startDate);
      const end = new Date(endDate);

      while (current <= end) {
        const day = current.getDay();
        if (day >= 1 && day <= 5) {
          weekdays++;
          if (useRule2 && isRule2Restricted(current, carLastDigit)) rule2Days++;
          if (useRule5 && isRule5Restricted(current, carLastDigit)) rule5Days++;
        }
        current.setDate(current.getDate() + 1);
      }

      const isRoundTrip = document.getElementById('roundTrip').checked;
      const dailyCommuteFuelCost = isRoundTrip ? currentFuelCost : currentFuelCost * 2;
      const saving2 = rule2Days * dailyCommuteFuelCost;
      const saving5 = rule5Days * dailyCommuteFuelCost;

      document.getElementById('weekdayCountText').textContent = `${formatNumber(weekdays)} 일`;
      document.getElementById('rule2DaysText').textContent = useRule2 ? `${formatNumber(rule2Days)} 일` : '-';
      document.getElementById('rule5DaysText').textContent = useRule5 ? `${formatNumber(rule5Days)} 일` : '-';
      document.getElementById('saving2Text').textContent = useRule2 ? `${formatNumber(Math.round(saving2))} 원` : '-';
      document.getElementById('saving5Text').textContent = useRule5 ? `${formatNumber(Math.round(saving5))} 원` : '-';
    }

    function bindAddressInput(type) {
      const input = document.getElementById(type === 'start' ? 'startAddress' : 'goalAddress');
      input.addEventListener('input', () => handleAddressInput(type));
      input.addEventListener('focus', () => handleAddressInput(type));
      input.addEventListener('keydown', async (e) => {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          moveSuggestionFocus(type, 1);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          moveSuggestionFocus(type, -1);
        } else if (e.key === 'Enter') {
          if (await chooseActiveSuggestion(type)) {
            e.preventDefault();
          } else {
            e.preventDefault();
            searchAddress(input.value, type);
          }
        } else if (e.key === 'Escape') {
          hideSuggestions(type);
        }
      });
    }

    document.addEventListener('click', function(e) {
      const startInput = document.getElementById('startAddress');
      const goalInput = document.getElementById('goalAddress');
      const startBox = document.getElementById('startSuggestions');
      const goalBox = document.getElementById('goalSuggestions');
      if (!startInput.contains(e.target) && !startBox.contains(e.target)) hideSuggestions('start');
      if (!goalInput.contains(e.target) && !goalBox.contains(e.target)) hideSuggestions('goal');
    });

    document.getElementById('roundTrip').addEventListener('change', function() {
      if (currentRouteDistanceKm > 0) calculateFuelCost();
    });

    (async function bootstrap() {
      initMap();
      bindAddressInput('start');
      bindAddressInput('goal');
      await initExternalSearchEngines();
    })();
  </script>
