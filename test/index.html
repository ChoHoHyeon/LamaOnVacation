<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Maps 최소 테스트</title>
  <style>
    #map { width: 100%; height: 500px; }
  </style>
</head>
<body>
  <h2>Google Maps API 테스트</h2>
  <div id="map"></div>

  <script>
    function initMap() {
      const center = { lat: 35.8714, lng: 128.6014 };
      new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 13
      });
    }
  </script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD2lqWWhG6p8xICc8rD4Ha7upQGJc1HU8E&callback=initMap">
  </script>
</body>
</html>
